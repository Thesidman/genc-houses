<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oracle · House Revelation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #02010a;
      --gold: #c9a84c;
      --gold-d: rgba(201,168,76,0.3);
      --gold-glow: rgba(201,168,76,0.5);
      --glass: rgba(255,255,255,0.035);
      --border: rgba(255,255,255,0.07);
      --border-g: rgba(201,168,76,0.35);
      --text: rgba(232,224,255,0.9);
    }

    html, body { width:100%; height:100%; overflow:hidden; background:var(--void); color:var(--text); font-family:'Rajdhani',sans-serif; }

    /* ── CANVAS LAYERS ── */
    #cv-cosmos, #cv-conf { position:fixed; inset:0; pointer-events:none; }
    #cv-cosmos { z-index:1; }
    #cv-conf   { z-index:20; }

    /* ── FLASH ── */
    #flash {
      position:fixed; inset:0; z-index:50;
      opacity:0; pointer-events:none;
      transition:opacity 0.08s;
    }
    #flash.bang { opacity:1; }
    #flash.fade { opacity:0; transition:opacity 1s; }

    /* ── SCREENS ── */
    .scr {
      position:fixed; inset:0; z-index:10;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:opacity 0.55s ease;
    }
    .scr.off { opacity:0; pointer-events:none; }

    /* ═══════════════════════════════════
       ACT I  — SELECTION
    ════════════════════════════════════ */
    #sel { padding:2rem 1.5rem; gap:0; overflow:hidden; }

    /* Title */
    .ttl-block { text-align:center; margin-bottom:1.6rem; }

    .ttl-eyebrow {
      font-family:'Orbitron',monospace;
      font-size:clamp(0.45rem,1vw,0.6rem);
      letter-spacing:0.7em;
      color:rgba(201,168,76,0.45);
      margin-bottom:0.6rem;
      opacity:0;
      animation:fuIn 1s ease 0.3s forwards;
    }

    h1.ttl {
      font-family:'Cinzel',serif;
      font-weight:900;
      font-size:clamp(2rem,5.5vw,4.2rem);
      letter-spacing:0.3em;
      background:linear-gradient(140deg, #fff7e6 0%, #c9a84c 30%, #fff 55%, #a8c8ff 80%, #c9a84c 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-size:300% 100%;
      animation:shimmer 7s ease-in-out infinite, fuIn 1s ease 0.5s backwards;
      filter:drop-shadow(0 0 35px rgba(201,168,76,0.35));
    }

    @keyframes shimmer { 0%,100%{background-position:0% center} 50%{background-position:100% center} }

    .ttl-rule {
      width:100%; max-width:600px; height:1px; margin:0.85rem auto 0;
      background:linear-gradient(90deg,transparent,rgba(201,168,76,0.5),transparent);
      opacity:0;
      animation:fuIn 1s ease 0.9s forwards;
    }

    .ttl-sub {
      font-family:'Orbitron',monospace;
      font-size:clamp(0.45rem,1vw,0.6rem);
      letter-spacing:0.5em;
      color:rgba(201,168,76,0.45);
      margin-top:0.6rem;
      opacity:0;
      animation:fuIn 1s ease 1s forwards;
    }

    @keyframes fuIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* Search */
    .srch-wrap {
      position:relative;
      width:100%; max-width:340px;
      margin-bottom:1.4rem;
      opacity:0;
      animation:fuIn 1s ease 1.2s forwards;
    }
    .srch-ico {
      position:absolute; left:1rem; top:50%; transform:translateY(-50%);
      color:var(--gold-d); font-size:0.9rem; pointer-events:none;
    }
    #search {
      width:100%;
      background:rgba(201,168,76,0.04);
      border:1px solid var(--border-g);
      border-radius:5px;
      padding:0.65rem 1rem 0.65rem 2.4rem;
      color:#fff;
      font-family:'Orbitron',monospace;
      font-size:0.75rem;
      letter-spacing:0.2em;
      outline:none;
      transition:border-color 0.3s, box-shadow 0.3s;
    }
    #search::placeholder { color:rgba(255,255,255,0.18); }
    #search:focus {
      border-color:var(--gold);
      box-shadow:0 0 24px rgba(201,168,76,0.2), inset 0 0 12px rgba(201,168,76,0.04);
    }

    /* Grid wrapper */
    #grid-wrap {
      width:100%; max-width:840px;
      opacity:0;
      animation:fuIn 1s ease 1.4s forwards;
    }

    /* Names grid */
    #names-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(128px,1fr));
      gap:0.8rem;
      max-height:52vh;
      overflow-y:auto;
      padding:0.2rem 0.3rem 1rem;
    }
    #names-grid::-webkit-scrollbar { width:3px; }
    #names-grid::-webkit-scrollbar-thumb { background:var(--gold-d); border-radius:2px; }
    #names-grid::-webkit-scrollbar-track { background:transparent; }

    /* Name card */
    .nc {
      position:relative;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:10px;
      padding:1rem 0.6rem;
      display:flex; flex-direction:column; align-items:center; gap:0.55rem;
      cursor:pointer;
      transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),
                  border-color 0.25s, box-shadow 0.25s;
      overflow:hidden;
      animation:ncIn 0.5s ease backwards;
    }
    .nc::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at 50% -10%, rgba(201,168,76,0.18), transparent 60%);
      opacity:0; transition:opacity 0.3s;
    }
    .nc:hover { transform:translateY(-5px) scale(1.05); border-color:var(--border-g); box-shadow:0 8px 30px rgba(201,168,76,0.18),0 0 0 1px rgba(201,168,76,0.1) inset; }
    .nc:hover::before { opacity:1; }
    @keyframes ncIn { from{opacity:0;transform:translateY(18px) scale(0.88)} to{opacity:1;transform:none} }

    .nc-av {
      width:46px; height:46px; border-radius:50%;
      background:conic-gradient(from 180deg, rgba(201,168,76,0.45), rgba(65,105,225,0.35), rgba(155,89,182,0.35), rgba(0,206,209,0.35), rgba(201,168,76,0.45));
      border:1px solid rgba(201,168,76,0.45);
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-size:1.1rem; font-weight:700;
      color:#fff; text-shadow:0 0 14px rgba(201,168,76,0.9);
      position:relative; z-index:1;
    }
    .nc-nm {
      font-size:0.92rem; font-weight:600; letter-spacing:0.06em;
      color:rgba(255,255,255,0.82); text-align:center;
      position:relative; z-index:1;
    }

    /* card exit */
    .nc.bye     { animation:ncBye 0.45s cubic-bezier(0.55,0,1,0.45) forwards !important; }
    .nc.chosen  { animation:ncChosen 0.75s cubic-bezier(0.34,1.56,0.64,1) forwards !important; }
    .nc.hidden  { display:none; }

    @keyframes ncBye {
      to { transform:scale(0.05) rotate(20deg) translateY(-30px); opacity:0; filter:blur(6px); }
    }
    @keyframes ncChosen {
      30% { transform:scale(1.28); border-color:var(--gold); box-shadow:0 0 55px rgba(201,168,76,0.85); }
      100% { transform:scale(0) rotate(-12deg); opacity:0; }
    }

    /* ═══════════════════════════════════
       ACT II — ORACLE
    ════════════════════════════════════ */
    #orc {
      gap:1.4rem;
      background:rgba(2,1,10,0.94);
      backdrop-filter:blur(24px);
    }

    /* Scanline */
    .scanline {
      position:absolute; left:0; right:0; height:1px; top:0; pointer-events:none;
      background:linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.6) 35%, rgba(255,255,255,0.95) 50%, rgba(201,168,76,0.6) 65%, transparent 100%);
      animation:scanMove 2.2s ease-in-out infinite;
    }
    @keyframes scanMove { 0%{top:0%;opacity:0} 8%{opacity:1} 92%{opacity:1} 100%{top:100%;opacity:0} }

    /* Mandala rings */
    .ring-wrap { position:relative; width:230px; height:230px; flex-shrink:0; }
    .ring-wrap svg { position:absolute; inset:0; width:100%; height:100%; }

    .r1 { animation:spin  4s linear infinite; }
    .r2 { animation:spin  7s linear infinite reverse; }
    .r3 { animation:spin 11s linear infinite; }
    .r-pulse { animation:rPulse 2s ease-in-out infinite; }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes rPulse  { 0%,100%{opacity:0.35} 50%{opacity:1} }

    .orc-center {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    }
    #orc-init {
      font-family:'Cinzel',serif; font-size:3.2rem; font-weight:900;
      color:var(--gold);
      text-shadow:0 0 28px rgba(201,168,76,0.95), 0 0 60px rgba(201,168,76,0.4);
      animation:glitch 3.5s ease-in-out infinite;
    }
    @keyframes glitch {
      0%,88%,100% { transform:translate(0); text-shadow:0 0 28px rgba(201,168,76,0.95),0 0 60px rgba(201,168,76,0.4); }
      90% { transform:translate(-3px,1px);  text-shadow:3px 0 0 #ff2251,-3px 0 0 #00eaff; }
      92% { transform:translate(3px,-1px);  text-shadow:-3px 0 0 #ff2251,3px 0 0 #00eaff; }
      94% { transform:translate(0);         text-shadow:0 0 28px rgba(201,168,76,0.95); }
    }

    #orc-status {
      font-family:'Orbitron',monospace;
      font-size:0.6rem; letter-spacing:0.4em;
      color:rgba(201,168,76,0.7); text-align:center;
      max-width:320px;
      transition:opacity 0.25s;
    }
    #orc-name {
      font-family:'Cinzel',serif;
      font-size:clamp(2.6rem,6vw,4.8rem); font-weight:900;
      color:#fff; letter-spacing:0.2em;
      text-shadow:0 0 50px rgba(255,255,255,0.45);
      text-align:center;
    }

    /* ═══════════════════════════════════
       ACT III — REVEAL
    ════════════════════════════════════ */
    #rev { gap:0.9rem; }

    #rev-bg {
      position:absolute; inset:0;
      opacity:0; transition:opacity 1.6s ease;
    }
    #rev-bg.on { opacity:1; }

    /* shockwave ring */
    .sw {
      position:absolute; width:8px; height:8px; border-radius:50%;
      top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0);
      pointer-events:none;
      animation:swEx 2s ease-out forwards;
    }
    @keyframes swEx {
      0%  { transform:translate(-50%,-50%) scale(0); opacity:0.9; }
      100%{ transform:translate(-50%,-50%) scale(500); opacity:0; }
    }

    #bnr-wrap {
      position:relative; z-index:10;
      width:min(90vw,860px);
      transform:scale(0.08) translateY(60px);
      opacity:0; filter:brightness(4) blur(24px);
      transition:transform 1.05s cubic-bezier(0.22,1,0.36,1),
                  opacity 0.3s ease,
                  filter 0.9s ease;
    }
    #bnr-wrap.on { transform:scale(1) translateY(0); opacity:1; filter:brightness(1) blur(0); }

    #bnr-img { width:100%; border-radius:10px; display:block; }

    #bnr-glow {
      position:absolute; inset:-25px; border-radius:22px;
      opacity:0.55; filter:blur(35px);
      pointer-events:none; z-index:-1;
    }

    #welcome {
      font-family:'Cinzel',serif;
      font-size:clamp(1rem,2.8vw,1.8rem); font-weight:700;
      text-align:center; letter-spacing:0.2em;
      color:#fff; line-height:1.7;
      opacity:0; transform:translateY(22px);
      transition:opacity 0.9s ease 0.7s, transform 0.9s ease 0.7s;
      position:relative; z-index:10;
    }
    #welcome.on { opacity:1; transform:translateY(0); }

    #again {
      position:relative; z-index:10;
      padding:0.65rem 2.2rem;
      background:transparent;
      border:1px solid var(--border-g);
      color:var(--gold);
      font-family:'Orbitron',monospace; font-size:0.65rem; letter-spacing:0.35em;
      cursor:pointer; border-radius:4px;
      opacity:0; transform:translateY(14px);
      transition:opacity 0.6s ease 1.7s, transform 0.6s ease 1.7s,
                  background 0.3s, box-shadow 0.3s;
    }
    #again.on { opacity:1; transform:translateY(0); }
    #again:hover { background:rgba(201,168,76,0.1); box-shadow:0 0 22px rgba(201,168,76,0.28); }

    /* members strip */
    #members {
      position:relative; z-index:10;
      font-family:'Orbitron',monospace;
      font-size:0.55rem; letter-spacing:0.4em;
      color:rgba(201,168,76,0.5); text-align:center;
      opacity:0; transform:translateY(14px);
      transition:opacity 0.8s ease 1.1s, transform 0.8s ease 1.1s;
    }
    #members.on { opacity:1; transform:translateY(0); }
  </style>
</head>
<body>

<canvas id="cv-cosmos"></canvas>
<canvas id="cv-conf"></canvas>
<div id="flash"></div>

<!-- ══════════ ACT I: SELECTION ══════════ -->
<div class="scr" id="sel">
  <div class="ttl-block">
    <p class="ttl-eyebrow">✦ &nbsp; CLASS: MYTHIC GUARDIAN &nbsp; · &nbsp; OPERATIONAL STATUS: ACTIVE &nbsp; ✦</p>
    <h1 class="ttl">THE ORACLE AWAITS</h1>
    <div class="ttl-rule"></div>
    <p class="ttl-sub">▸ SELECT YOUR NAME &nbsp;·&nbsp; LET THE HOUSES REVEAL THEMSELVES ◂</p>
  </div>

  <div class="srch-wrap">
    <span class="srch-ico">⟡</span>
    <input id="search" type="text" placeholder="FIND YOUR NAME..." autocomplete="off" spellcheck="false">
  </div>

  <div id="grid-wrap">
    <div id="names-grid"></div>
  </div>
</div>

<!-- ══════════ ACT II: ORACLE ══════════ -->
<div class="scr off" id="orc">
  <div class="scanline"></div>

  <div class="ring-wrap">
    <!-- Outer dashed ring -->
    <svg class="r1" viewBox="0 0 230 230" fill="none">
      <circle cx="115" cy="115" r="108" stroke="rgba(201,168,76,0.22)" stroke-width="1" stroke-dasharray="7 7"/>
      <circle cx="115" cy="115" r="108" stroke="rgba(201,168,76,0.12)" stroke-width="10" stroke-dasharray="35 195"/>
    </svg>
    <!-- Mid patterned ring -->
    <svg class="r2" viewBox="0 0 230 230" fill="none">
      <circle cx="115" cy="115" r="85" stroke="rgba(201,168,76,0.45)" stroke-width="1.5" stroke-dasharray="14 7 3 7"/>
      <circle cx="115" cy="115" r="85" stroke="rgba(201,168,76,0.08)" stroke-width="12" stroke-dasharray="40 130"/>
    </svg>
    <!-- Inner ring + needle -->
    <svg class="r3" viewBox="0 0 230 230" fill="none">
      <circle cx="115" cy="115" r="62" stroke="rgba(201,168,76,0.65)" stroke-width="1" stroke-dasharray="4 4"/>
      <polygon points="115,53 119.5,67 115,65 110.5,67" fill="rgba(201,168,76,0.95)"/>
      <line x1="115" y1="115" x2="115" y2="65" stroke="rgba(201,168,76,0.3)" stroke-width="0.5"/>
    </svg>
    <!-- Pulse halo -->
    <svg class="r-pulse" viewBox="0 0 230 230" fill="none">
      <circle cx="115" cy="115" r="100" stroke="rgba(201,168,76,0.25)" stroke-width="18" stroke-opacity="0.12"/>
    </svg>

    <div class="orc-center">
      <div id="orc-init">?</div>
    </div>
  </div>

  <div id="orc-status">AWAITING AETHERIC SIGNATURE...</div>
  <div id="orc-name"></div>
</div>

<!-- ══════════ ACT III: REVEAL ══════════ -->
<div class="scr off" id="rev">
  <div id="rev-bg"></div>
  <div id="bnr-wrap">
    <div id="bnr-glow"></div>
    <img id="bnr-img" src="" alt="House Banner">
  </div>
  <div id="members"></div>
  <div id="welcome"></div>
  <button id="again" onclick="reset()">◂ &nbsp; CONSULT THE ORACLE AGAIN &nbsp; ▸</button>
</div>

<script>
// ─────────────────────────────────────────
//  HOUSE DATA
// ─────────────────────────────────────────
const H = {
  MYRITH: {
    members:['Neha','Sameer','Pradipta','Taher','Sneha'],
    img:'myrith.jpg', color:'#4a7aff', glow:'rgba(74,122,255,0.55)',
    particles:['#4a7aff','#D4AF37','#a8c8ff','#fffde7','#c9a84c','#ffffff'],
    tagline:'THE STARS HAVE ALIGNED FOR YOU'
  },
  ORVANE: {
    members:['Ojas','Avikalp','Manish','Saran','Samarth'],
    img:'orvane.jpg', color:'#00d4ff', glow:'rgba(0,212,255,0.55)',
    particles:['#00d4ff','#00ffff','#0096c7','#e0f7fa','#ffffff','#80ffff'],
    tagline:'THE DEEP WATERS CLAIM YOU'
  },
  KAELIX: {
    members:['Nitin','Soundarya','Chanakya','Jenil','Himanshu','Rachit'],
    img:'kaelix.jpg', color:'#1e90ff', glow:'rgba(30,144,255,0.6)',
    particles:['#1e90ff','#00bfff','#ffffff','#87ceeb','#4169e1','#aaddff'],
    tagline:'THE STORM HAS CHOSEN ITS WARRIOR'
  },
  SYVORA: {
    members:['Sangam','Sailee','Ahan','Parikshit','Prathibha'],
    img:'syvora.jpg', color:'#b060ff', glow:'rgba(176,96,255,0.55)',
    particles:['#9b59b6','#c77dff','#e8b4ff','#ffffff','#7b2fff','#d3a9ff'],
    tagline:'THE MOON WHISPERS YOUR NAME'
  }
};

// name → house key
const NM = {};
for (const [k,d] of Object.entries(H)) d.members.forEach(n => NM[n.toLowerCase()] = k);

// ─────────────────────────────────────────
//  COSMOS STARFIELD
// ─────────────────────────────────────────
const CV = document.getElementById('cv-cosmos');
const CX = CV.getContext('2d');
const RV = document.getElementById('cv-conf');
const RX = RV.getContext('2d');

function resz() {
  CV.width = RV.width = innerWidth;
  CV.height = RV.height = innerHeight;
}
resz();
window.addEventListener('resize', resz);

const STARS = Array.from({length:240}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight,
  r: Math.random()*1.6+0.2,
  a: Math.random()*0.75+0.25,
  ts: Math.random()*0.025+0.004,
  to: Math.random()*Math.PI*2,
  dx: (Math.random()-0.5)*0.07
}));

const NBS = [
  {c:'rgba(65,105,225,', ox:0.12,oy:0.18,tx:0.9,ty:0.65},
  {c:'rgba(155,89,182,',  ox:0.82,oy:0.72,tx:1.2,ty:1.05},
  {c:'rgba(0,180,209,',   ox:0.48,oy:0.08,tx:0.85,ty:1.3},
  {c:'rgba(201,168,76,',  ox:0.28,oy:0.82,tx:1.1,ty:0.75},
  {c:'rgba(100,60,180,',  ox:0.65,oy:0.45,tx:1.35,ty:0.95},
];

let ft=0;
(function cosmosLoop(){
  CX.clearRect(0,0,CV.width,CV.height);
  const t = ft*0.00055;
  NBS.forEach(n=>{
    const x=CV.width*(n.ox+0.35*Math.sin(t*n.tx));
    const y=CV.height*(n.oy+0.28*Math.cos(t*n.ty));
    const g=CX.createRadialGradient(x,y,0,x,y,CV.width*0.42);
    g.addColorStop(0, n.c+'0.045)'); g.addColorStop(1,'transparent');
    CX.fillStyle=g; CX.fillRect(0,0,CV.width,CV.height);
  });
  STARS.forEach(s=>{
    const a=s.a*(0.4+0.6*Math.sin(ft*s.ts+s.to));
    CX.beginPath(); CX.arc(s.x,s.y,s.r,0,Math.PI*2);
    CX.fillStyle=`rgba(255,255,255,${a})`; CX.fill();
    s.x+=s.dx;
    if(s.x<0)s.x=CV.width; if(s.x>CV.width)s.x=0;
  });
  ft++; requestAnimationFrame(cosmosLoop);
})();

// ─────────────────────────────────────────
//  CONFETTI ENGINE
// ─────────────────────────────────────────
let CP=[], CA=false;

class Piece {
  constructor(cols) {
    this.x = Math.random()*RV.width;
    this.y = -12;
    this.s = Math.random()*9+3;
    this.c = cols[Math.floor(Math.random()*cols.length)];
    this.vx = (Math.random()-0.5)*6;
    this.vy = Math.random()*3+0.8;
    this.rot = Math.random()*360;
    this.rs = (Math.random()-0.5)*12;
    this.sq = Math.random()>0.45;
    this.life = 1;
    this.dec = Math.random()*0.0035+0.0015;
  }
  tick()  { this.x+=this.vx; this.vy+=0.09; this.y+=this.vy; this.rot+=this.rs; this.life-=this.dec; }
  draw()  {
    RX.save(); RX.globalAlpha=Math.max(0,this.life);
    RX.translate(this.x,this.y); RX.rotate(this.rot*Math.PI/180);
    RX.fillStyle=this.c;
    if(this.sq){ RX.fillRect(-this.s/2,-this.s/3,this.s,this.s/2.5); }
    else { RX.beginPath(); RX.arc(0,0,this.s/2,0,Math.PI*2); RX.fill(); }
    RX.restore();
  }
  dead() { return this.life<=0 || this.y>RV.height+20; }
}

function burst(cols) {
  for(let i=0;i<200;i++) setTimeout(()=>CP.push(new Piece(cols)), Math.random()*2800);
  if(!CA){ CA=true; confLoop(); }
}
function confLoop() {
  RX.clearRect(0,0,RV.width,RV.height);
  CP=CP.filter(p=>!p.dead());
  CP.forEach(p=>{p.tick();p.draw();});
  if(CP.length>0) requestAnimationFrame(confLoop); else CA=false;
}

// ─────────────────────────────────────────
//  POPULATE NAMES GRID
// ─────────────────────────────────────────
const grid  = document.getElementById('names-grid');
const srch  = document.getElementById('search');

// Shuffle names so order is random and not alphabetical by house
const names = Object.values(H).flatMap(d=>d.members).sort(()=>Math.random()-0.5);

function buildGrid() {
  grid.innerHTML='';
  names.forEach((n,i)=>{
    const el = document.createElement('div');
    el.className='nc';
    el.dataset.n=n;
    el.style.animationDelay=`${i*0.055}s`;
    el.innerHTML=`<div class="nc-av">${n[0]}</div><div class="nc-nm">${n}</div>`;
    el.addEventListener('click',()=>act1Select(n,el));
    grid.appendChild(el);
  });
}
buildGrid();

srch.addEventListener('input',()=>{
  const q=srch.value.toLowerCase().trim();
  document.querySelectorAll('.nc').forEach(c=>{
    c.classList.toggle('hidden', q!=='' && !c.dataset.n.toLowerCase().includes(q));
  });
});

// ─────────────────────────────────────────
//  SCREEN SWITCHER
// ─────────────────────────────────────────
function show(id) {
  ['sel','orc','rev'].forEach(s=>{
    document.getElementById(s).classList.toggle('off', s!==id);
  });
}

// ─────────────────────────────────────────
//  ACT I → II  (select a name)
// ─────────────────────────────────────────
function act1Select(name, el) {
  document.querySelectorAll('.nc').forEach(c=>{
    if(c===el) { c.classList.add('chosen'); }
    else { setTimeout(()=>c.classList.add('bye'), Math.random()*420); }
  });

  setTimeout(()=>{
    show('orc');
    act2Oracle(name);
  }, 850);
}

// ─────────────────────────────────────────
//  ACT II  (oracle scanning)
// ─────────────────────────────────────────
function act2Oracle(name) {
  document.getElementById('orc-init').textContent = name[0].toUpperCase();
  document.getElementById('orc-name').textContent = name.toUpperCase();

  const msgs = [
    'SCANNING AETHERIC SIGNATURE...',
    'CROSS-REFERENCING SOUL MATRIX...',
    'CONSULTING THE ANCIENT CODEX...',
    'HOUSE RESONANCE LOCK CONFIRMED...',
    'DESTINY CONFIRMED ✦'
  ];

  const st = document.getElementById('orc-status');
  let i=0;
  const iv = setInterval(()=>{
    i++;
    if(i<msgs.length){
      st.style.opacity='0';
      setTimeout(()=>{ st.textContent=msgs[i]; st.style.opacity='1'; }, 240);
    } else {
      clearInterval(iv);
      setTimeout(()=>act3Reveal(name), 720);
    }
  }, 660);
}

// ─────────────────────────────────────────
//  ACT III  (house reveal)
// ─────────────────────────────────────────
function act3Reveal(name) {
  const hk = NM[name.toLowerCase()];
  const hd = H[hk];

  // Flash in house color
  const fl = document.getElementById('flash');
  fl.style.background = hd.color;
  fl.classList.add('bang');
  setTimeout(()=>{ fl.classList.add('fade'); fl.classList.remove('bang'); },60);
  setTimeout(()=>fl.classList.remove('fade'), 1000);

  // Wire up reveal content
  document.getElementById('bnr-img').src  = hd.img;
  document.getElementById('bnr-glow').style.background = hd.glow;
  document.getElementById('rev-bg').style.background   =
    `radial-gradient(ellipse at 50% 60%, ${hd.glow} 0%, transparent 68%)`;

  const othersInHouse = hd.members.filter(m=>m!==name).join('  ·  ');
  document.getElementById('members').textContent = `HOUSE ${hk}  ·  ${othersInHouse}`;

  document.getElementById('welcome').innerHTML =
    `WELCOME,&nbsp;<span style="color:${hd.color};text-shadow:0 0 35px ${hd.glow}">${name.toUpperCase()}</span><br>
     <small style="font-size:0.52em;letter-spacing:0.38em;opacity:0.65;font-family:'Orbitron',monospace">
       ${hd.tagline}
     </small>`;

  show('rev');

  // Triple shockwaves staggered
  [0,280,560].forEach((d,i)=>{
    setTimeout(()=>{
      const sw=document.createElement('div');
      sw.className='sw';
      sw.style.cssText=`border:${2.2-i*0.6}px solid ${hd.color};`;
      sw.style.animationDelay='0ms';
      document.getElementById('rev').appendChild(sw);
      setTimeout(()=>sw.remove(), 2200);
    }, d+80);
  });

  // Animate banner & bg
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      document.getElementById('rev-bg').classList.add('on');
      document.getElementById('bnr-wrap').classList.add('on');
    });
  });

  setTimeout(()=>document.getElementById('members').classList.add('on'),  900);
  setTimeout(()=>document.getElementById('welcome').classList.add('on'),  1000);
  setTimeout(()=>document.getElementById('again').classList.add('on'),    1700);

  // Confetti!
  setTimeout(()=>burst(hd.particles), 250);
}

// ─────────────────────────────────────────
//  RESET → ACT I
// ─────────────────────────────────────────
function reset() {
  // Kill confetti
  CP=[]; RX.clearRect(0,0,RV.width,RV.height); CA=false;

  // Reset reveal state
  ['rev-bg','bnr-wrap','welcome','again','members'].forEach(id=>{
    document.getElementById(id).classList.remove('on');
  });

  // Rebuild cards (cleanest way to clear animation states)
  buildGrid();
  srch.value='';
  show('sel');
}
</script>
</body>
</html>
