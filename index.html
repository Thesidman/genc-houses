// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
let currentAudio = null;

async function fetchVoiceover(name) {
  const script = VOICES[name.toLowerCase()] || `${name}. The Oracle has spoken. Your house has been revealed.`;
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE}/stream`, {
      method: 'POST',
      headers: { 'xi-api-key': EL_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: script,
        model_id: EL_MODEL,
        voice_settings: { stability: 0.42, similarity_boost: 0.78, style: 0.35, use_speaker_boost: true }
      })
    });
    if (!res.ok) throw new Error(`EL ${res.status}`);
    const blob = await res.blob();
    return URL.createObjectURL(blob);
  } catch(e) {
    console.warn('ElevenLabs error:', e);
    return null;
  }
}

function playVoiceover(url) {
  return new Promise(resolve => {
    if (!url) { resolve(); return; }
    currentAudio = new Audio(url);
    currentAudio.volume = 0.92;
    currentAudio.addEventListener('ended', resolve);
    currentAudio.addEventListener('error', resolve);
    currentAudio.play().catch(resolve);
  });
}

function stopVoiceover() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
}

let von=false,vpts=[],vint=null;
class VP{constructor(){const a=Math.random()*Math.PI*2,r=Math.random()*Math.max(innerWidth,innerHeight)*.7+100;this.x=innerWidth/2+Math.cos(a)*r;this.y=innerHeight/2+Math.sin(a)*r;this.angle=a;this.rad=r;this.rs=(.5+Math.random()*.8)*(Math.random()<.5?1:-1);this.pull=2+Math.random()*3;this.r=Math.random()*2+.5;this.a2=Math.random()*.7+.3;this.c=`hsl(${45+Math.random()*20},80%,${60+Math.random()*20}%)`;this.dead=false;}tick(){this.rad-=this.pull;this.angle+=this.rs*(Math.PI/180);this.x=innerWidth/2+Math.cos(this.angle)*this.rad;this.y=innerHeight/2+Math.sin(this.angle)*this.rad;if(this.rad<8)this.dead=true;}draw(){xfx.beginPath();xfx.arc(this.x,this.y,this.r,0,Math.PI*2);xfx.fillStyle=this.c;xfx.globalAlpha=this.a2*(Math.min(this.rad,80)/80);xfx.fill();xfx.globalAlpha=1;}}
function startVortex(){von=true;vpts=[];vint=setInterval(()=>{for(let i=0;i<6;i++)vpts.push(new VP());},40);(function vl(){if(!von){xfx.clearRect(0,0,cfx.width,cfx.height);return;}xfx.clearRect(0,0,cfx.width,cfx.height);vpts=vpts.filter(p=>!p.dead);vpts.forEach(p=>{p.tick();p.draw();});requestAnimationFrame(vl);})();}
function stopVortex(){clearInterval(vint);von=false;}

let CP=[],CA=false;
class Pc{constructor(cls){this.x=Math.random()*ccf.width;this.y=-12;this.s=Math.random()*9+3;this.c=cls[Math.floor(Math.random()*cls.length)];this.vx=(Math.random()-.5)*6;this.vy=Math.random()*3+.8;this.rot=Math.random()*360;this.rs=(Math.random()-.5)*12;this.sq=Math.random()>.45;this.l=1;this.dc=Math.random()*.0035+.0015;}tick(){this.x+=this.vx;this.vy+=.09;this.y+=this.vy;this.rot+=this.rs;this.l-=this.dc;}draw(){xcf.save();xcf.globalAlpha=Math.max(0,this.l);xcf.translate(this.x,this.y);xcf.rotate(this.rot*Math.PI/180);xcf.fillStyle=this.c;if(this.sq)xcf.fillRect(-this.s/2,-this.s/3,this.s,this.s/2.5);else{xcf.beginPath();xcf.arc(0,0,this.s/2,0,Math.PI*2);xcf.fill();}xcf.restore();}dead(){return this.l<=0||this.y>ccf.height+20;}}
function burst(cls){for(let i=0;i<200;i++)setTimeout(()=>CP.push(new Pc(cls)),Math.random()*2800);if(!CA){CA=true;cfl();}}
function cfl(){xcf.clearRect(0,0,ccf.width,ccf.height);CP=CP.filter(p=>!p.dead());CP.forEach(p=>{p.tick();p.draw();});if(CP.length>0)requestAnimationFrame(cfl);else CA=false;}

let atOn=false,atType='',atD={};
function startAtmo(type,color){cat.classList.add('on');atOn=true;atType=type;atD={t:0,color,rip:[],bolts:[]};atLoop();}
function stopAtmo(){atOn=false;cat.classList.remove('on');xat.clearRect(0,0,cat.width,cat.height);}
function atLoop(){if(!atOn)return;xat.clearRect(0,0,cat.width,cat.height);atD.t++;if(atType==='stars')_stars();if(atType==='water')_water();if(atType==='lightning')_lightning();if(atType==='aurora')_aurora();requestAnimationFrame(atLoop);}
let _ss=[];
function _stars(){if(Math.random()<.04)_ss.push({x:-50,y:Math.random()*cat.height*.5,vx:12+Math.random()*8,vy:3+Math.random()*4,l:1,len:80+Math.random()*120});_ss=_ss.filter(s=>{s.x+=s.vx;s.y+=s.vy;s.l-=.012;if(s.l<=0||s.x>cat.width+200)return false;const g=xat.createLinearGradient(s.x,s.y,s.x-s.len,s.y-s.len*.35);g.addColorStop(0,`rgba(255,255,220,${s.l*.8})`);g.addColorStop(1,'transparent');xat.strokeStyle=g;xat.lineWidth=2*s.l;xat.beginPath();xat.moveTo(s.x,s.y);xat.lineTo(s.x-s.len,s.y-s.len*.35);xat.stroke();return true;});for(let i=0;i<4;i++){const x=cat.width*(.12+i*.22);const g=xat.createLinearGradient(x,0,x+35,cat.height);g.addColorStop(0,'rgba(201,168,76,.032)');g.addColorStop(1,'transparent');xat.fillStyle=g;xat.fillRect(x,0,28,cat.height);}}
function _water(){if(atD.t%22===0)atD.rip.push({x:Math.random()*cat.width,y:Math.random()*cat.height,r:0,max:80+Math.random()*120,l:1});atD.rip=atD.rip.filter(r=>{r.r+=2.2;r.l-=.009;if(r.l<=0)return false;const a=r.l*.27*(1-r.r/r.max);xat.strokeStyle=`rgba(0,212,255,${Math.max(0,a)})`;xat.lineWidth=1.5*r.l;xat.beginPath();xat.ellipse(r.x,r.y,r.r,r.r*.35,0,0,Math.PI*2);xat.stroke();xat.beginPath();xat.ellipse(r.x,r.y,r.r*.55,r.r*.18,0,0,Math.PI*2);xat.stroke();return r.r<r.max;});const t=atD.t;for(let i=0;i<5;i++){const x=cat.width*(Math.sin(t*.012+i*1.2)*.5+.5),y=cat.height*(Math.cos(t*.009+i*.9)*.5+.5);const g=xat.createRadialGradient(x,y,0,x,y,70);g.addColorStop(0,'rgba(0,212,255,.052)');g.addColorStop(1,'transparent');xat.fillStyle=g;xat.fillRect(0,0,cat.width,cat.height);}}
function _lightning(){if(Math.random()<.06){const side=Math.random()<.5?'left':'right',sx=side==='left'?0:cat.width,pts=[{x:sx,y:Math.random()*cat.height}];let cx2=sx,cy2=pts[0].y;for(let i=0;i<10;i++){cx2+=(side==='left'?1:-1)*(25+Math.random()*35);cy2+=(Math.random()-.5)*90;pts.push({x:cx2,y:cy2});}const bolt={pts,l:1,w:1+Math.random()*2.5,br:[]};if(Math.random()<.6){const bi=Math.floor(pts.length/2),bp=[pts[bi]];let bx=pts[bi].x,by=pts[bi].y;for(let i=0;i<4;i++){bx+=(side==='left'?1:-1)*(18+Math.random()*25);by+=(Math.random()-.5)*65;bp.push({x:bx,y:by});}bolt.br.push(bp);}atD.bolts.push(bolt);}atD.bolts=atD.bolts.filter(b=>{b.l-=.06;if(b.l<=0)return false;const dp=(pts,w)=>{xat.shadowBlur=15;xat.shadowColor='rgba(30,144,255,.9)';xat.strokeStyle=`rgba(150,200,255,${b.l*.9})`;xat.lineWidth=w*b.l;xat.beginPath();xat.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>xat.lineTo(p.x,p.y));xat.stroke();xat.strokeStyle=`rgba(255,255,255,${b.l*.6})`;xat.lineWidth=w*.4*b.l;xat.beginPath();xat.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>xat.lineTo(p.x,p.y));xat.stroke();xat.shadowBlur=0;};dp(b.pts,b.w);b.br.forEach(br=>dp(br,b.w*.5));return true;});}
function _aurora(){const t=atD.t*.008;for(let b=0;b<6;b++){const yB=cat.height*(.04+b*.07),hue=265+b*18+Math.sin(t+b)*25;const g=xat.createLinearGradient(0,yB-70,0,yB+70);g.addColorStop(0,'transparent');g.addColorStop(.5,`hsla(${hue},85%,62%,.1)`);g.addColorStop(1,'transparent');xat.beginPath();xat.moveTo(0,yB);for(let x=0;x<=cat.width;x+=6){const y=yB+Math.sin(x*.007+t+b*.85)*35+Math.sin(x*.013-t*.75+b)*18;xat.lineTo(x,y);}xat.lineTo(cat.width,yB+200);xat.lineTo(0,yB+200);xat.closePath();xat.fillStyle=g;xat.fill();}}

const RC2=document.getElementById('rc'),RX=RC2.getContext('2d');
const RS=Math.min(460,innerWidth*.88);RC2.width=RC2.height=RS;const RM=RS/2;
const RUNES=['бљ ','бљў','бљ¦','бљЁ','бљ±','бљІ','бљ·','бљ№','бљє','б›Ѓ','б›ѓ','б›‡','б›€','б›‰','б›Љ','б›Џ','б›’','б›–','б›—','б›љ','б›њ','б›ћ','б›џ'];
let rT=0,rD=false;
(function ritLoop(){
  if(rD)return;rT++;RX.clearRect(0,0,RS,RS);const p=Math.min(rT/200,1);
  if(p>.05){const a=Math.min((p-.05)/.5,1);RX.strokeStyle=`rgba(201,168,76,${a*.55})`;RX.lineWidth=1;RX.setLineDash([6,6]);RX.beginPath();RX.arc(RM,RM,RM*.9,-Math.PI/2,-Math.PI/2+a*Math.PI*2);RX.stroke();}
  if(p>.2){const a=Math.min((p-.2)/.5,1);RX.strokeStyle=`rgba(201,168,76,${a*.75})`;RX.lineWidth=1.5;RX.setLineDash([4,4]);RX.beginPath();RX.arc(RM,RM,RM*.65,-Math.PI/2,-Math.PI/2+a*Math.PI*2*-1);RX.stroke();}
  if(p>.38){const sp=Math.min((p-.38)/.3,1);const pts=[];for(let i=0;i<5;i++){const a=(i*4/5)*Math.PI*2-Math.PI/2;pts.push({x:RM+Math.cos(a)*RM*.65,y:RM+Math.sin(a)*RM*.65});}RX.strokeStyle=`rgba(201,168,76,${sp*.45})`;RX.lineWidth=1;RX.setLineDash([]);RX.beginPath();RX.moveTo(pts[0].x,pts[0].y);for(let i=1;i<=Math.min(Math.floor(sp*10),10);i++)RX.lineTo(pts[i%5].x,pts[i%5].y);RX.stroke();}
  if(p>.55){const rc=Math.floor((p-.55)/.45*RUNES.length);RX.setLineDash([]);for(let i=0;i<Math.min(rc,RUNES.length);i++){const a=(i/RUNES.length)*Math.PI*2-Math.PI/2;RX.font=`${RM*.072}px serif`;RX.fillStyle=`rgba(201,168,76,${.28+.18*Math.sin(rT*.06+i)})`;RX.textAlign='center';RX.textBaseline='middle';RX.fillText(RUNES[i],RM+Math.cos(a)*RM*.82,RM+Math.sin(a)*RM*.82);}}
  const pulse=.5+.5*Math.sin(rT*.14),grd=RX.createRadialGradient(RM,RM,0,RM,RM,RM*.22);grd.addColorStop(0,`rgba(201,168,76,${p*.32*pulse})`);grd.addColorStop(1,'transparent');RX.fillStyle=grd;RX.setLineDash([]);RX.fillRect(0,0,RS,RS);
  if(p>.72){const tp=(p-.72)/.28;RX.font=`bold ${RM*.13}px 'Cinzel',serif`;RX.fillStyle=`rgba(201,168,76,${tp*.9})`;RX.textAlign='center';RX.textBaseline='middle';RX.fillText('ORACLE',RM,RM);RX.font=`${RM*.042}px 'Orbitron',monospace`;RX.fillStyle=`rgba(201,168,76,${tp*.5})`;RX.fillText('HOUSE REVELATION',RM,RM+RM*.2);}
  if(p>=1){rD=true;setTimeout(()=>{document.getElementById('ritual').classList.add('out');setTimeout(()=>{document.getElementById('ritual').style.display='none';show('sel');AE.init();AE.startAmbient();},900);},700);return;}
  requestAnimationFrame(ritLoop);
})();

  // Fetch voiceover immediately вЂ” runs in parallel with animation
  const voicePromise = fetchVoiceover(name);

  // Status message cycle (keeps cycling until audio finishes)
  const msgs = [
    'SCANNING AETHERIC SIGNATURE...',
    'CROSS-REFERENCING SOUL MATRIX...',
    'CONSULTING THE ANCIENT CODEX...',
    'HOUSE RESONANCE DETECTED...',
    'ALIGNING CELESTIAL COORDINATES...',
    'DESTINY LOCK IN PROGRESS...',
    'RESONANCE CONFIRMED...',
    'FATE SEALED вњ¦'
  ];
  let msgIdx = 0;
  const st = document.getElementById('os');
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % msgs.length;
    st.style.opacity = '0';
    setTimeout(() => { st.textContent = msgs[msgIdx]; st.style.opacity = '1'; }, 240);
  }, 1100);

  // Fade ambient music down so voiceover is clear
  AE.fade(0.18, 1.2);

  // Once audio URL is ready, play it and show the "speaking" indicator
  voicePromise.then(async (url) => {
    document.getElementById('vo-bar').classList.add('on');
    await playVoiceover(url); // WAITS until audio ends
    document.getElementById('vo-bar').classList.remove('on');
    clearInterval(msgInterval);
    stopVortex();
    // Transition to verdict immediately when voice ends
    act25(name);
  });
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
//  ACT II.5: DRAMATIC VERDICT BUILDUP
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function act25(name) {
  show('verd');
  AE.fade(0.08, 0.6);

  const vn=document.getElementById('vn'),vm=document.getElementById('vm'),vh=document.getElementById('vh'),vc=document.getElementById('vc');
  vn.textContent=name.toUpperCase();vm.textContent='';vh.innerHTML='<span id="vq">???</span>';
  [vn,vm,vh,vc].forEach(el=>el.classList.remove('on'));
  document.getElementById('verd').classList.remove('lb-on');

  setTimeout(()=>document.getElementById('verd').classList.add('lb-on'),50);
  setTimeout(()=>vn.classList.add('on'),350);
  setTimeout(()=>{AE.heartbeat(.22);vn.classList.add('pulse');setTimeout(()=>vn.classList.remove('pulse'),400);},750);
  setTimeout(()=>{vm.textContent='THE ORACLE HAS SPOKEN...';vm.classList.add('on');},1100);
  setTimeout(()=>{AE.heartbeat(.34);vn.classList.add('pulse');setTimeout(()=>vn.classList.remove('pulse'),400);},1550);
  setTimeout(()=>{vm.style.opacity='0';setTimeout(()=>{vm.textContent='YOU BELONG TO...';vm.style.opacity='1';},300);},1950);
  setTimeout(()=>vh.classList.add('on'),2250);
  setTimeout(()=>AE.tension(),2450);
  setTimeout(()=>vc.classList.add('on'),3200);
  setTimeout(()=>act3(name),3950);
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
//  ACT III: HOUSE REVEAL
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function act3(name) {
  const hk=NM[name.toLowerCase()],hd=H[hk];
  document.body.classList.add('shake');setTimeout(()=>document.body.classList.remove('shake'),700);
  AE.boom(hd.chord);
  const fl=document.getElementById('flash');fl.style.background=hd.color;fl.classList.add('bang');setTimeout(()=>{fl.classList.add('fade');fl.classList.remove('bang');},65);setTimeout(()=>fl.classList.remove('fade'),1250);
  document.getElementById('bi').src=hd.img;
  document.getElementById('bg2').style.background=hd.glow;
  document.getElementById('rb').style.background=`radial-gradient(ellipse at 50% 60%,${hd.glow} 0%,transparent 68%)`;
  document.getElementById('mb').textContent=`HOUSE ${hk}  В·  ${hd.members.filter(m=>m!==name).join('  В·  ')}`;
  document.getElementById('wt').innerHTML=`WELCOME,&nbsp;<span style="color:${hd.color};text-shadow:0 0 35px ${hd.glow}">${name.toUpperCase()}</span><br><small style="font-size:.52em;letter-spacing:.38em;opacity:.65;font-family:'Orbitron',monospace">${hd.tagline}</small>`;
  document.getElementById('verd').classList.remove('lb-on');
  show('rev');
  [0,260,520].forEach((d,i)=>{setTimeout(()=>{const sw=document.createElement('div');sw.className='shw';sw.style.cssText=`border:${2.2-i*.6}px solid ${hd.color};`;document.getElementById('rev').appendChild(sw);setTimeout(()=>sw.remove(),2200);},d+60);});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{document.getElementById('rb').classList.add('on');document.getElementById('bw').classList.add('on');}));
  setupDecrypt(hd.color);
  setTimeout(()=>startAtmo(hd.atmo,hd.color),380);
  setTimeout(()=>spawnName(hk,hd.color),220);
  setTimeout(()=>document.getElementById('mb').classList.add('on'),950);
  setTimeout(()=>document.getElementById('wt').classList.add('on'),1080);
  setTimeout(()=>document.getElementById('ag').classList.add('on'),1850);
  setTimeout(()=>burst(hd.particles),200);
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
//  BANNER DECRYPTION FX
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function setupDecrypt(color){
  const dc=document.getElementById('bd'),img=document.getElementById('bi');
  const run=()=>{dc.width=img.naturalWidth||860;dc.height=img.naturalHeight||400;const dctx=dc.getContext('2d');let t=0;(function dl(){if(t>65){dc.classList.add('gone');return;}dctx.clearRect(0,0,dc.width,dc.height);const cov=1-(t/65);for(let row=0;row<20;row++){if(Math.random()<cov){dctx.fillStyle=Math.random()<.25?color:'#000';dctx.globalAlpha=.72*cov;dctx.fillRect((Math.random()-.5)*18*cov,row*(dc.height/20),dc.width,dc.height/20);}}dctx.globalAlpha=cov*.45;dctx.fillStyle='rgba(255,255,255,.4)';dctx.fillRect(0,(t/65)*dc.height,dc.width,2);dctx.globalAlpha=1;t++;requestAnimationFrame(dl);})();};
  img.complete&&img.naturalWidth?run():(img.onload=run);
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
//  PARTICLE-FORMED HOUSE NAME
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function spawnName(text,color){
  const c=document.getElementById('hnc'),ctx=c.getContext('2d');c.width=Math.min(innerWidth*.9,860);c.height=80;
  const off=document.createElement('canvas');off.width=c.width;off.height=c.height;const octx=off.getContext('2d');
  octx.fillStyle='#fff';octx.font=`bold ${Math.min(c.width/text.length*.82,54)}px 'Cinzel',serif`;octx.textAlign='center';octx.textBaseline='middle';octx.fillText(text,c.width/2,c.height/2);
  const id=octx.getImageData(0,0,c.width,c.height).data,pts=[];
  for(let y=0;y<c.height;y+=3)for(let x=0;x<c.width;x+=3)if(id[(y*c.width+x)*4+3]>128)pts.push({tx:x,ty:y});
  const parts=pts.map(p=>({x:Math.random()*c.width,y:Math.random()*c.height+80,tx:p.tx,ty:p.ty,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,l:0}));
  let frame=0;
  (function pl(){if(frame>200)return;ctx.clearRect(0,0,c.width,c.height);const pg=Math.min(frame/100,1);parts.forEach(p=>{p.x+=(p.tx-p.x)*.13+p.vx*(1-pg);p.y+=(p.ty-p.y)*.13+p.vy*(1-pg);p.vx*=.88;p.vy*=.88;p.l=Math.min(p.l+.05,1);ctx.beginPath();ctx.arc(p.x,p.y,1.3,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=p.l*pg;ctx.shadowBlur=5;ctx.shadowColor=color;ctx.fill();});ctx.globalAlpha=1;ctx.shadowBlur=0;frame++;requestAnimationFrame(pl);})();
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
//  RESET
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function doReset(){
  stopVoiceover();
  CP=[];xcf.clearRect(0,0,ccf.width,ccf.height);CA=false;
  stopAtmo();AE.fade(.72,1.5);
  ['rb','bw','wt','ag','mb'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('bd').classList.remove('gone');
  document.getElementById('hnc').getContext('2d').clearRect(0,0,innerWidth,80);
  ['vn','vm','vh','vc'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('verd').classList.remove('lb-on');
  document.getElementById('vo-bar').classList.remove('on');
  buildGrid();srch.value='';show('sel');
}
